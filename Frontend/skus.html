        <div class="relative bg-slate-800 rounded-xl sm:rounded-2xl shadow-2xl border border-slate-700/50 max-w-2xl w-full max-h-[calc(100vh-2rem)] sm:max-h-[90vh] my-auto sm:my-0 mt-4 sm:mt-0 overflow-hidden">
          <button id="modalClose" class="absolute top-2 right-2 sm:top-4 sm:right-4 z-[1002] w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors duration-200 text-lg sm:text-xl font-bold shadow-lg" title="Cerrar (ESC)">&times;</button>
          <div id="modalBody" class="p-4 sm:p-6 overflow-y-auto max-h-[calc(100vh-4rem)] sm:max-h-[90vh] custom-scrollbar">
          </div>
        </div>
      </div>

      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="sk-section-card rounded-xl shadow-lg p-6 mb-6">
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
              <h1 class="text-2xl md:text-3xl font-bold sk-text mb-1">📦 Gestión de SKUs</h1>
              <p class="text-sm sk-muted opacity-90">Control y seguimiento de códigos de repuestos</p>
            </div>
            <div class="flex gap-3">
              <button type="button" id="btn-refresh" class="sk-btn-secondary px-4 py-2 font-semibold rounded-lg transition-all duration-200 flex items-center gap-2">
                <span>🔄</span>
                <span>Actualizar</span>
              </button>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-5 mb-6" id="stats-grid">
          <div class="sk-section-card rounded-xl shadow-lg p-5 border-l-4 border-l-blue-600">
            <div class="text-3xl md:text-4xl font-bold sk-text" id="total-skus">0</div>
            <div class="text-sm sk-muted mt-1">Total SKUs</div>
          </div>
          <div class="sk-section-card rounded-xl shadow-lg p-5 border-l-4 border-l-amber-500">
            <div class="text-3xl md:text-4xl font-bold sk-text" id="pending-skus">0</div>
            <div class="text-sm sk-muted mt-1">Pendientes</div>
          </div>
          <div class="sk-section-card rounded-xl shadow-lg p-5 border-l-4 border-l-blue-600">
            <div class="text-3xl md:text-4xl font-bold sk-text" id="printed-skus">0</div>
            <div class="text-sm sk-muted mt-1">Impresos</div>
          </div>
          <div class="sk-section-card rounded-xl shadow-lg p-5 border-l-4 border-l-green-600">
            <div class="text-3xl md:text-4xl font-bold sk-text" id="applied-skus">0</div>
            <div class="text-sm sk-muted mt-1">Aplicados</div>
          </div>
        </div>

        <div class="sk-section-card rounded-xl shadow-lg p-6 mb-6">
          <div class="flex flex-wrap gap-3 items-end mb-4">
            <div class="flex-1 min-w-[260px]">
              <label class="block text-xs font-medium sk-label mb-1.5">Buscar (código, descripción, notas)</label>
              <input id="sku-search" placeholder="Ej: FLINY, BOMBA, filtro" class="w-full px-4 py-2 sk-field-input rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" />
            </div>
            <div>
              <label class="block text-xs font-medium sk-label mb-1.5">Categoría</label>
              <select id="sku-category" class="px-4 py-2 sk-field-input rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200">
                <option value="all">Todas</option>
                <option value="MOTOR">Motor</option>
                <option value="TRANSMISION">Transmisión</option>
                <option value="FRENOS">Frenos</option>
                <option value="SUSPENSION">Suspensión</option>
                <option value="ELECTRICO">Eléctrico</option>
                <option value="CARROCERIA">Carrocería</option>
                <option value="INTERIOR">Interior</option>
                <option value="FILTROS">Filtros</option>
                <option value="ACEITES">Aceites</option>
                <option value="NEUMATICOS">Neumáticos</option>
                <option value="OTROS">Otros</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium sk-label mb-1.5">Estado</label>
              <select id="sku-status" class="px-4 py-2 sk-field-input rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200">
                <option value="all">Todos</option>
                <option value="pending">Pendiente</option>
                <option value="printed">Impreso</option>
                <option value="applied">Aplicado</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-transparent mb-1.5">&nbsp;</label>
              <div class="flex gap-2">
                <button type="button" id="sku-apply" class="sk-btn-secondary px-4 py-2 font-semibold rounded-lg transition-all duration-200">Buscar</button>
                <button type="button" id="sku-clear" class="sk-btn-secondary px-4 py-2 font-semibold rounded-lg transition-all duration-200">Limpiar</button>
              </div>
            </div>
          </div>
          <div class="flex flex-wrap gap-2 items-center pt-4 border-t sk-toolbar-divider">
            <button type="button" id="sku-sel-page" class="sk-btn-secondary px-4 py-2 font-semibold rounded-lg transition-all duration-200 text-sm" title="Seleccionar todos los SKUs de la página">Seleccionar página</button>
            <button type="button" id="sku-sel-clear" class="sk-btn-secondary px-4 py-2 font-semibold rounded-lg transition-all duration-200 text-sm" title="Limpiar selección">Limpiar selección</button>
            <button type="button" id="sku-bulk-printed" class="sk-btn-primary px-4 py-2 font-semibold rounded-lg transition-all duration-200 text-sm" title="Marcar seleccionados como impresos">Marcar impresos (<span id="sku-sel-count">0</span>)</button>
            <button type="button" id="sku-bulk-applied" class="sk-btn-secondary px-4 py-2 font-semibold rounded-lg transition-all duration-200 text-sm" title="Marcar seleccionados como aplicados">Marcar aplicados</button>
          </div>
        </div>

        <div id="loading" class="hidden text-center py-10">
          <div class="spinner"></div>
          <p class="sk-muted mt-4">Cargando SKUs...</p>
        </div>

        <div id="sku-list" class="sk-list-shell rounded-xl shadow-lg overflow-hidden"></div>
        <div id="sku-pager" class="hidden flex justify-end items-center gap-2 mt-4">
          <button type="button" id="pg-prev" class="sk-btn-secondary px-4 py-2 font-semibold rounded-lg transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">◀ Anterior</button>
          <div class="text-sm sk-muted min-w-[120px] text-center" id="pg-info">Página 1/1</div>
          <button type="button" id="pg-next" class="sk-btn-secondary px-4 py-2 font-semibold rounded-lg transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Siguiente ▶</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const ui = {};
    const state = { page: 1, limit: 25, search: '', category: 'all', status: 'all', totalPages: 1 };
    const selected = new Set();

    document.addEventListener('DOMContentLoaded', function() {
      ui.loading = document.getElementById('loading');
      ui.list = document.getElementById('sku-list');
      ui.pager = document.getElementById('sku-pager');
      ui.pgPrev = document.getElementById('pg-prev');
      ui.pgNext = document.getElementById('pg-next');
      ui.pgInfo = document.getElementById('pg-info');
      ui.btnRefresh = document.getElementById('btn-refresh');

      ui.qSearch = document.getElementById('sku-search');
      ui.qCategory = document.getElementById('sku-category');
      ui.qStatus = document.getElementById('sku-status');
      ui.btnApply = document.getElementById('sku-apply');
      ui.btnClear = document.getElementById('sku-clear');

      ui.btnSelPage = document.getElementById('sku-sel-page');
      ui.btnSelClear = document.getElementById('sku-sel-clear');
      ui.btnBulkPrinted = document.getElementById('sku-bulk-printed');
      ui.btnBulkApplied = document.getElementById('sku-bulk-applied');
      ui.selCount = document.getElementById('sku-sel-count');

      ui.btnApply.onclick = () => { state.page = 1; applyFilters(); };
      ui.btnClear.onclick = () => { ui.qSearch.value=''; ui.qCategory.value='all'; ui.qStatus.value='all'; state.page=1; applyFilters(); };
      ui.pgPrev.onclick = () => { if (state.page>1){ state.page--; loadPage(); } };
      ui.pgNext.onclick = () => { if (state.page<state.totalPages){ state.page++; loadPage(); } };

      if (ui.btnRefresh) ui.btnRefresh.onclick = () => { loadStats(); loadPage(); };

      if (ui.btnSelPage) ui.btnSelPage.onclick = () => selectCurrentPage();
      if (ui.btnSelClear) ui.btnSelClear.onclick = () => clearSelection();
      if (ui.btnBulkPrinted) ui.btnBulkPrinted.onclick = () => bulkMarkPrinted();
      if (ui.btnBulkApplied) ui.btnBulkApplied.onclick = () => bulkMarkApplied();

      loadStats();
      loadPage();
    });

    async function loadStats(){
      try{
        const r = await API.skus.stats();
        updateStats(r.total||{});
      }catch(e){ console.warn('stats error', e.message); }
    }

    function paramsToQuery(){
      const q = { page: state.page, limit: state.limit, sortBy: 'printStatus,createdAt', sortOrder: 'asc,desc' };
      if (state.search && state.search.trim()) q.search = state.search.trim();
      if (state.category && state.category!=='all') q.category = state.category;
      if (state.status && state.status!=='all') q.printStatus = state.status;
      return q;
    }

    function applyFilters(){
      state.search = (ui.qSearch.value||'').trim();
      state.category = ui.qCategory.value;
      state.status = ui.qStatus.value;
      loadPage();
    }

    function skuStatusPill(status, pendingStickers){
      const map = { pending: ['status-pending','⏳ Pendiente'], printed: ['status-printed','🖨️ Impreso'], applied: ['status-applied','✅ Aplicado'] };
      const m = map[status] || ['status-pending','Pendiente'];
      const pending = Number(pendingStickers||0);
      const badge = (status==='pending' && pending>0) ? `<span class="ml-1.5 sk-badge-amber rounded-full px-2 py-0.5 text-xs">🖨 ${pending} pendientes</span>` : '';
      return `<span class="sku-status ${m[0]} px-2 py-1 rounded-full text-xs font-semibold" title="${m[1]}">${m[1]}</span>${badge}`;
    }

    function rowActions(sku){
      const btns = [];
      if (sku.printStatus === 'pending') btns.push(`<button type="button" class="px-3 py-1.5 sk-btn-primary rounded-lg transition-all duration-200 text-sm font-semibold" data-print="${sku._id}" title="Marcar como impreso">🖨️</button>`);
      if (sku.printStatus === 'printed') btns.push(`<button type="button" class="px-3 py-1.5 sk-btn-green rounded-lg transition-all duration-200 text-sm font-semibold" data-apply="${sku._id}" title="Marcar como aplicado">✅</button>`);
      btns.push(`<button type="button" class="px-3 py-1.5 sk-btn-secondary rounded-lg transition-all duration-200 text-sm font-semibold" data-notes="${sku._id}" title="Editar notas">✏️</button>`);
      return btns.join(' ');
    }

    async function loadPage(){
      ui.loading.classList.remove('hidden');
      ui.list.innerHTML = '';
      ui.pager.classList.add('hidden');
      try{
        const q = paramsToQuery();
        const data = await API.skus.list(q);
        const skus = Array.isArray(data?.skus) ? data.skus : (Array.isArray(data?.skus?.skus) ? data.skus.skus : (data?.skus || []));
        const pg = data?.pagination || data?.pg || { current: 1, pages: 1, total: skus.length, limit: state.limit };
        state.totalPages = Math.max(1, parseInt(pg.pages||1));
        state.page = Math.max(1, Math.min(state.totalPages, parseInt(pg.current||1)));

        ui.list.innerHTML = skus.map(sku => `
          <div class="sk-list-row px-5 py-4 flex flex-col md:flex-row gap-3 md:gap-4 items-start md:items-center transition-colors duration-200">
            <input type="checkbox" class="sku-select" data-id="${sku._id}" ${selected.has(String(sku._id)) ? 'checked' : ''} />
            <div class="flex-1 min-w-0">
              <div class="font-bold sk-text text-lg mb-1">${sku.code}</div>
              <div class="text-sm sk-muted mb-2">${sku.description || ''}</div>
              <div class="flex flex-wrap gap-3 text-xs sk-muted mb-2">
                <span>📅 ${sku.createdAt ? new Date(sku.createdAt).toLocaleDateString('es-ES') : ''}</span>
                ${sku.brand ? `<span>🏷️ ${sku.brand}</span>` : ''}
                ${sku.location ? `<span>📍 ${sku.location}</span>` : ''}
              </div>
              <div class="mt-2 p-2 sk-notes-box rounded text-sm">📝 <span id="n-${sku._id}">${sku.notes || ''}</span></div>
            </div>
            <div class="flex items-center gap-2">
              ${skuStatusPill(sku.printStatus, sku.pendingStickers)}
              <div class="flex gap-2">${rowActions(sku)}</div>
            </div>
          </div>
        `).join('');

        ui.list.querySelectorAll('.sku-select').forEach(cb => cb.addEventListener('change', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          if (e.currentTarget.checked) selected.add(String(id)); else selected.delete(String(id));
          updateSelectionCount();
        }));
        ui.list.querySelectorAll('[data-print]').forEach(b => b.addEventListener('click', async (e) => {
          const id = e.currentTarget.getAttribute('data-print');
          await API.skus.markAsPrinted(id); loadStats(); loadPage();
        }));
        ui.list.querySelectorAll('[data-apply]').forEach(b => b.addEventListener('click', async (e) => {
          const id = e.currentTarget.getAttribute('data-apply');
          await API.skus.markAsApplied(id); loadStats(); loadPage();
        }));
        ui.list.querySelectorAll('[data-notes]').forEach(b => b.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-notes');
          openNotesModal(id);
        }));

        ui.pgInfo.textContent = `Página ${state.page} / ${state.totalPages}`;
        ui.pgPrev.disabled = state.page <= 1;
        ui.pgNext.disabled = state.page >= state.totalPages;
        ui.pager.classList.toggle('hidden', state.totalPages <= 1);
      }catch(err){
        showNotification('Error cargando SKUs: '+err.message, 'error');
      }finally{
        ui.loading.classList.add('hidden');
      }
    }

    function updateSelectionCount(){ if (ui.selCount) ui.selCount.textContent = String(selected.size); }
    function clearSelection(){ selected.clear(); updateSelectionCount(); if (ui.list){ ui.list.querySelectorAll('.sku-select').forEach(cb => { cb.checked = false; }); } }
    function selectCurrentPage(){ if(!ui.list) return; ui.list.querySelectorAll('.sku-select').forEach(cb => { cb.checked = true; const id = cb.getAttribute('data-id'); selected.add(String(id)); }); updateSelectionCount(); }

    async function bulkMarkPrinted(){
      if (selected.size === 0) { showNotification('No hay SKUs seleccionados', 'warning'); return; }
      const ids = Array.from(selected);
      ui.btnBulkPrinted && (ui.btnBulkPrinted.disabled = true);
      try{
        const base = window.API?.base || '';
        const token = window.API?.token?.get?.();
        const res = await fetch(`${base}/api/v1/skus/bulk/print`, { method:'POST', headers: { 'Content-Type': 'application/json', ...(token?{ Authorization: `Bearer ${token}` }:{}) }, body: JSON.stringify({ ids }) });
        const txt = await res.text(); let data; try{ data=JSON.parse(txt);}catch{ data=txt; }
        if(!res.ok) throw new Error(data?.error || res.statusText);
        const { matched=0, modified=0 } = data || {};
        showNotification(`Marcados como impresos: ${modified}/${matched}.`, 'success');
        clearSelection();
        await loadStats();
        await loadPage();
      }finally{
        ui.btnBulkPrinted && (ui.btnBulkPrinted.disabled = false);
      }
    }

    async function bulkMarkApplied(){
      if (selected.size === 0) { showNotification('No hay SKUs seleccionados', 'warning'); return; }
      const ids = Array.from(selected);
      ui.btnBulkApplied && (ui.btnBulkApplied.disabled = true);
      try{
        const base = window.API?.base || '';
        const token = window.API?.token?.get?.();
        const res = await fetch(`${base}/api/v1/skus/bulk/apply`, { method:'POST', headers: { 'Content-Type': 'application/json', ...(token?{ Authorization: `Bearer ${token}` }:{}) }, body: JSON.stringify({ ids }) });
        const txt = await res.text(); let data; try{ data=JSON.parse(txt);}catch{ data=txt; }
        if(!res.ok) throw new Error(data?.error || res.statusText);
        const { matched=0, modified=0 } = data || {};
        showNotification(`Marcados como aplicados: ${modified}/${matched}.`, 'success');
        clearSelection();
        await loadStats();
        await loadPage();
      }finally{
        ui.btnBulkApplied && (ui.btnBulkApplied.disabled = false);
      }
    }

    function updateStats(stats) {
      document.getElementById('total-skus').textContent = stats.total || 0;
      document.getElementById('pending-skus').textContent = stats.pending || 0;
      document.getElementById('printed-skus').textContent = stats.printed || 0;
      document.getElementById('applied-skus').textContent = stats.applied || 0;
    }

    function openNotesModal(id){
      const span = document.getElementById('n-'+id);
      const current = span ? span.textContent : '';
      const modal = document.getElementById('modal');
      const body = document.getElementById('modalBody');
      const close = document.getElementById('modalClose');
      if(!modal||!body||!close){ return alert('Modal no disponible'); }
      body.innerHTML = `
        <h3 class="text-xl font-bold sk-text mb-4">Notas del SKU</h3>
        <textarea id="sku-notes-text" rows="6" class="w-full px-4 py-3 sk-field-input rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-y">${current.replace(/</g,'&lt;')}</textarea>
        <div class="flex justify-end gap-2 mt-4">
          <button type="button" id="notes-cancel" class="sk-btn-secondary px-4 py-2 font-semibold rounded-lg transition-all duration-200">Cancelar</button>
          <button type="button" id="notes-save" class="sk-btn-primary px-4 py-2 font-semibold rounded-lg transition-all duration-200">Guardar</button>
        </div>`;
      modal.classList.remove('hidden');
      document.body.classList.add('modal-open');
      const closeAll = () => { modal.classList.add('hidden'); body.innerHTML=''; document.body.classList.remove('modal-open'); };
      close.onclick = closeAll;
      document.getElementById('notes-cancel').onclick = closeAll;
      document.getElementById('notes-save').onclick = async () => {
        try{
          const value = document.getElementById('sku-notes-text').value || '';
          await API.skus.updateNotes(id, value);
          if (span) span.textContent = value;
          showNotification('Notas actualizadas', 'success');
          closeAll();
        }catch(e){ showNotification('No se pudieron actualizar las notas: '+e.message, 'error'); }
      };
    }

    function showNotification(message, type = 'info') {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.textContent = message;
      document.body.appendChild(notification);

      setTimeout(() => notification.classList.add('show'), 100);
      setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }

    async function printStickers() { showNotification('Imprimir stickers: usa las acciones en Inventario.', 'info'); }
  </script>
  <script type="module" src="./assets/js/app.js" charset="utf-8"></script>
  <script src="./assets/js/admin-context.js"></script>
  <script src="./assets/js/input-fix.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const mobileMenuToggle = document.getElementById('mobileMenuToggle');
      const mobileMenu = document.getElementById('mobileMenu');
      const logoutBtn = document.getElementById('logoutBtn');
      const logoutBtnMobile = document.getElementById('logoutBtnMobile');
      const companyName = document.getElementById('companyName');
      const companyNameMobile = document.getElementById('companyNameMobile');

      if (companyName && companyNameMobile) {
        const observer = new MutationObserver(() => {
          companyNameMobile.textContent = companyName.textContent;
        });
        observer.observe(companyName, { childList: true, characterData: true, subtree: true });
        companyNameMobile.textContent = companyName.textContent;
      }

      if (logoutBtn && logoutBtnMobile) {
        logoutBtnMobile.addEventListener('click', () => {
          if (logoutBtn.onclick) logoutBtn.onclick();
          else logoutBtn.click();
        });

        const logoutObserver = new MutationObserver(() => {
          logoutBtnMobile.classList.toggle('hidden', logoutBtn.classList.contains('hidden'));
        });
        logoutObserver.observe(logoutBtn, { attributes: true, attributeFilter: ['class'] });
        logoutBtnMobile.classList.toggle('hidden', logoutBtn.classList.contains('hidden'));
      }

      if (mobileMenuToggle && mobileMenu) {
        mobileMenuToggle.addEventListener('click', () => {
          mobileMenu.classList.toggle('hidden');
          const icon = mobileMenuToggle.querySelector('svg');
          if (icon) {
            if (mobileMenu.classList.contains('hidden')) {
              icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>';
            } else {
              icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>';
            }
          }
        });

        mobileMenu.querySelectorAll('.mobile-nav-tab').forEach(link => {
          link.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
            const icon = mobileMenuToggle.querySelector('svg');
            if (icon) {
              icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>';
            }
          });
        });
      }

      const currentPage = document.body.getAttribute('data-page');
      document.querySelectorAll('.nav-tab, .mobile-nav-tab').forEach(tab => {
        if (tab.getAttribute('data-tab') === currentPage) {
          tab.classList.add('active');
        }
      });

      document.querySelectorAll('.nav-tab, .mobile-nav-tab').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const href = btn.getAttribute('data-href');
          if (href && href !== window.location.pathname.split('/').pop()) {
            window.location.href = href;
          }
        });
      });
    });

    function setupCatalogButton() {
      const btns = document.querySelectorAll('.js-open-public-catalog');
      if (!btns.length) return;
      const API = window.API;
      if (!API || !API.token || !API.token.get) {
        setTimeout(setupCatalogButton, 100);
        return;
      }
      const applyReady = (companyId, enabled) => {
        btns.forEach(btn => {
          if (!companyId) { btn.disabled = true; btn.title = 'No se pudo obtener companyId'; return; }
          if (!enabled) { btn.disabled = true; btn.title = 'Catálogo público deshabilitado'; btn.dataset.state = 'disabled'; return; }
          btn.dataset.state = 'ready';
          btn.disabled = false;
          btn.onclick = () => window.open('catalogo.html?companyId=' + encodeURIComponent(companyId), '_blank');
        });
      };
      const applyNoAuth = () => {
        btns.forEach(btn => { btn.disabled = true; btn.title = 'Inicia sesión para usar el catálogo'; });
      };
      const applyError = () => {
        btns.forEach(btn => { btn.disabled = true; btn.title = 'Error consultando empresa'; btn.dataset.state = 'error'; });
      };
      const token = API.token.get() || '';
      if (!token) { applyNoAuth(); return; }
      (API.companyMe ? API.companyMe() : Promise.reject(new Error('API no disponible')))
        .then(body => {
          const company = body?.company || body || {};
          const storedId = API?.companyId?.get?.() || '';
          const companyId = company.id || company._id || storedId || '';
          const enabled = (typeof company.publicCatalogEnabled === 'boolean') ? company.publicCatalogEnabled : true;
          applyReady(companyId, enabled);
        })
        .catch(() => {
          const storedId = API?.companyId?.get?.() || '';
          if (storedId) {
            btns.forEach(btn => {
              btn.dataset.state = 'ready'; btn.title = ''; btn.disabled = false;
              btn.onclick = () => window.open('catalogo.html?companyId=' + encodeURIComponent(storedId), '_blank');
            });
          } else {
            applyError();
          }
        });
    }
    document.addEventListener('DOMContentLoaded', setupCatalogButton);
    if (document.readyState !== 'loading') setupCatalogButton();
  </script>
</body>
</html>
